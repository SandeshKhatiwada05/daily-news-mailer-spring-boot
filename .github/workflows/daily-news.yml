name: Daily News

on:
  schedule:
    - cron: '0 0 * * 6,0'
  workflow_dispatch:

jobs:
  run-news-bot:
    runs-on: ubuntu-latest
    environment: GEMINI_API_KEY

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run App
        run: mvn spring-boot:run -q -Dspring-boot.run.arguments="--spring.main.web-application-type=none"
